<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบขอรับเอกสารทางการเรียนออนไลน์ — ย้ายที่อยู่ใหม่แล้ว</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="6;url=https://urrw-grade-system.vercel.app/request-docs.html">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .bg-school-red { background-color: #a51c1c; }
    .card {
      background: #fff;
      border: 1px solid #a51c1c;
      border-top: 4px solid #d4af37;
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .icon-wrap {
      width: 64px; height: 64px; border-radius: 50%;
      background: #fdf4d7; color: #8a6d0b;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 28px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; color: #a51c1c; margin: 0 0 12px; }
    p { color: #444; line-height: 1.7; margin: 0 0 8px; }
    .btn {
      display: inline-block; margin-top: 20px;
      background-color: #a51c1c; color: #fff; text-decoration: none;
      font-weight: 600; padding: 12px 28px; border-radius: 8px;
      transition: background-color .2s;
    }
    .btn:hover { background-color: #8b1a1a; }
    .note { font-size: .85rem; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap"><i class="fas fa-triangle-exclamation"></i></div>
    <h1>เว็บนี้ปิดให้บริการแล้ว</h1>
    <p>ระบบขอรับเอกสารทางการเรียนออนไลน์ได้ย้ายไปยังที่อยู่ใหม่แล้ว</p>
    <p>กรุณายื่นคำร้องผ่านลิงก์ใหม่ด้านล่างนี้แทน</p>
    <a class="btn" href="https://urrw-grade-system.vercel.app/request-docs.html">
      <i class="fas fa-arrow-right me-1"></i> ไปที่เว็บขอเอกสารใหม่
    </a>
    <p class="note">ระบบจะพาไปยังหน้าใหม่ให้อัตโนมัติใน 6 วินาที</p>
  </div>
</body>
</html>
